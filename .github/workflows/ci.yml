name: CI

# Runs on every PR targeting main and on pushes to main. Make both jobs
# required status checks in branch protection (Settings -> Branches) so a PR
# cannot merge into main until formatting passes and tests are green.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find app src tests include -type f \
            \( -name '*.cpp' -o -name '*.hpp' \) -print0 \
            | xargs -0 --no-run-if-empty clang-format --style=file --dry-run --Werror

  build-and-test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install Conan
        run: pipx install conan

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Install dependencies
        run: conan install . --build=missing -s build_type=Release

      - name: Configure
        run: cmake --preset conan-release

      - name: Build
        run: cmake --build --preset conan-release

      - name: Test
        run: ctest --preset conan-release --output-on-failure
